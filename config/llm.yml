# =============================================================================
# LLM configuration: local models, cloud models, main/embedding selection, mix-mode routing
# =============================================================================
# This file is loaded by Core when core.yml sets:
#   llm_config_file: llm.yml
# Path is relative to the directory containing core.yml (config/).
# Only keys listed below are read; they override or supply values merged into
# the main config. Edit this file for all LLM/model settings.
# =============================================================================

# ——— 1. llama.cpp server settings (for local models) ———
# One global block: same ctx_size, predict, temp, function_calling, etc. for every local model Core starts (main_llm, classifier, vision when on-demand). To use different settings for e.g. gpt-oss-20b vs Qwen3-4B, either set shared values that work for both or run one model yourself with a different config.
# ctx_size, predict, temp are used when starting the llama.cpp server (e.g. --predict 8192).
# For chat completions, max_tokens and temperature are sent per request (see completion below).
# predict vs max_tokens: predict = server default (llama-server --predict N); max_tokens = sent with each completion request (completion section). Core uses completion.max_tokens when present, else llama_cpp.predict, so per-request limit is what actually caps the reply length.
# ctx_size: total context window (input + output). Typical values: 8192, 16384, 32768 (32K), 65536 (64K).
# Higher = more VRAM/RAM and can slow inference; check your model's native max context.
#
# How to choose ctx_size:
#   • Start with 8192 or 16384 for speed/VRAM — use 32K only if you actually hit limits.
#   • You NEED larger context (e.g. 32K) when: long multi-turn chats, many tools/skills in one prompt,
#     large pasted docs, or compaction/trimming kicks in often (see compaction.reserve_tokens and logs).
#   • Signs to INCREASE: "context length exceeded", truncation, wrong routing, or model "forgets" earlier messages.
#   • If you rarely have long chats or big tool lists, 8192–16384 is usually enough and faster.
#
# ——— Performance: CUDA build, flash_attn: on, n_gpu_layers: 99. Optional: cont_batching, cache_type_k/q8_0 (KV cache), grp_attn_n/w (self-extend).
# Reduce ctx_size if you don't need long context. Quantized GGUF (Q4_K_M, Q5_K_M) is smaller and faster than F16.
llama_cpp:
  # 32768
  ctx_size: 262142 #128K
  predict: 131071   # server default max tokens (--predict); overridden per request by completion.max_tokens when Core sends it
  temp: 0.5
  threads: 4
  n_gpu_layers: 99
  verbose: false
  repeat_penalty: 1.5
  chat_format: null
  # true = enable tool/function calling (--jinja) for main_llm and any local model Core starts. Use true whether or not you use tool_selection_llm: main_llm still does tool turns (or continuation/direct reply). If you run tool_selection_llm yourself on its port, start that server with function calling too (e.g. --jinja or same llama_cpp config).
  function_calling: true
  cache_type_k: q4_0
  cache_type_v: q4_0
  # Model load / throughput (passed to llama-server at startup):
  # flash_attn: "auto" | "on" | "off" — use "on" for faster GPU inference when your llama.cpp build supports it.
  flash_attn: on
  # use_mmap: true = memory-map (default, lower RAM); false = --no-mmap (if you see mmap errors).
  use_mmap: false
  # batch_size: prompt batch size (default server ~512). Try 256–512 for 27B; higher = more VRAM, often better throughput.
  batch_size: 512
  cont_batching: true  #= --cont-batching (smaller batches, start generating sooner; helps avoid OOM on prefill).
  # Self-extend (long context with less slowdown): grp_attn_n = expansion factor (e.g. 4 for 4k→16k), grp_attn_w = window (e.g. 1024).
  #grp_attn_n: 4
  #grp_attn_w: 1024
  #qwen_mode: qwen35
  # stop: null   # optional; fallback when completion.stop not set. e.g. ["<|im_end|>", "</s>"]. For Qwen see completion.stop.
  # ——— Qwen / Qwen 3.5 (single entry point: all Qwen settings here only) ———
  # qwen_mode: "qwen3" | "qwen35" — applies to main_llm when set here. tool_selection_llm and vision_llm use root unless overridden in llama_cpp.tool_selection / llama_cpp.vision.
  # • Main_llm = Qwen: set qwen_mode here (e.g. qwen3). Optionally override in tool_selection/vision if those use a different model.
  # • Main_llm = GPT, tool_selection_llm = Qwen: leave root qwen_mode unset (comment out below); set qwen_mode only under llama_cpp.tool_selection so only tool_selection requests get Qwen params (enable_thinking, etc.).
  # qwen_mode: qwen3   # set when main_llm is Qwen; omit/comment out when main_llm is GPT and only tool_selection_llm is Qwen (set qwen_mode under tool_selection instead)
  # Optional when qwen_mode: qwen35: grammar path (default: config/grammars/qwen35_tools.gbnf). Uncomment only to use a different file.
  # qwen35_grammar_path: "config/grammars/qwen35_tools.gbnf"
  # Optional when qwen_mode: qwen35: set to true to enable GBNF grammar. Default: false (we parse both JSON and XML <tool_call> from prompt + stop).
  # When true: we inject tool definitions into the system prompt and do not send the tools array, so grammar can be used with tools (llama-server would return 400 if both were sent).
  #qwen35_use_grammar: true
  # ——— Qwen 3.5 performance (reasoning models): optional server defaults. Restart server after changing.
  # min_p: 0.05        # min-p sampling; reasoning models need a little room (0.05); 0 = disabled. Passed as --min-p to llama-server.
  # temp: 0.6          # for Qwen 3.5: 0.6 recommended (temp 0 hurts reasoning; too high breaks tool calls). Override in completion.temperature per-request.
  # repeat_penalty: 1.1   # Qwen tends to loop "thinking" phrases; 1.1 helps. Default above is 1.5; use 1.1 for Qwen 3.5 if you see repetition.
  # <think> control: reasoning_budget: 0 = disable <think> (grammar: qwen35_tools.gbnf, no <think>). -1 or omit = allow <think> (grammar: qwen35_tools_with_think.gbnf; server gets -1; we strip <think> and remove </think> from stop). Server accepts only 0 or -1. Restart Core after changing so the model server gets the flag.
  #
  # Tradeoff (neither is perfect):
  # • reasoning_budget: -1 (recommended): Fewer truncation issues; we remove </think> from stop so the answer after <think> is not cut off. Downside: some servers put the full reply in reasoning_content and leave content empty — we use reasoning_content as the reply and strip <think>, so empty-content issues are reduced. If you still see empty replies, set qwen_always_use_fallback_for_empty: true under completion (or tools_config).
  # • reasoning_budget: 0: Thinking disabled; server is asked to put output in content. Downside: with 0 some setups produce more malformed tool output or truncation. Prefer -1 unless you must disable <think>.
  # • disable_thinking_when_tools: default false. When false we do NOT send enable_thinking: false on tool turns (server keeps thinking on). This restores the previous stable behavior with Qwen VL (tool_calls work, no truncation). Set to true in completion or llama_cpp only if you see empty content with reasoning_content full (e.g. 4B).
  # reasoning_budget: -1   # -1 = allow thinking (recommended); 0 = disable <think> (may increase malformed tool calls or truncation)

  # ——— Embedding server: fully separate from main model. Only the keys below are used.
  # Uncomment and set any optional key as needed. Defaults when omitted: ctx_size 0, threads 4, n_gpu_layers 20, verbose false.
  embedding:
    ctx_size: 0           # 0 = use model default (recommended)
    threads: 4
    n_gpu_layers: 20
    verbose: false

    # ——— Optional (uncomment to override server defaults) ———
    # flash_attn: auto       # auto | on | off — Flash Attention for GPU
    # use_mmap: true         # false = --no-mmap (if embedding model has mmap errors)
    # batch_size: 512        # prompt batch size
    # cont_batching: false   # true = --cont-batching
    # cache_type_k: q8_0     # KV cache K quant: q8_0 | q4_0 | q4_1 — less VRAM
    # cache_type_v: q8_0     # KV cache V quant
    # predict: 8192          # max tokens (embedding often ignores)
    # temp: 0.8              # temperature
    # repeat_penalty: 1.5    # (embedding server may ignore when pooling)

  # ——— Vision LLM (when Core starts vision on demand): overrides merged with root. Same keys as root (ctx_size, predict, function_calling, stop, etc.). Omit to use root.
  vision:
    ctx_size: 8192
    predict: 2048
    function_calling: true
    stop: ["<|im_end|>"]

  # ——— Tool-selection LLM (when you run it and Core starts it, or for reference when you start it yourself): overrides merged with root.
  # When main_llm is GPT but tool_selection_llm is Qwen: leave root qwen_mode unset and set qwen_mode here so only tool_selection requests get Qwen behavior (enable_thinking: false, tool_temperature, etc.). Also set completion_tool_selection.stop (e.g. ["<|im_end|>"]) and optionally temperature.
  tool_selection:
    ctx_size: 262142
    predict: 8192
    function_calling: true
    stop: ["<|im_end|>"]
    qwen_mode: qwen3    # set when tool_selection_llm is Qwen and main_llm is not (e.g. GPT main + Qwen tool_selection). Omit to use root qwen_mode.
    # ——— Qwen3-4B xLAM/Codex (e.g. Manojb/Qwen3-4B-toolcalling-gguf-codex): model uses <tool_call> XML and conflicts with native toolcall parser. Set qwen3_xlam_style: true so Core injects tools in prompt, sends grammar, and omits tools array; we add "</tool_call>" to stop.
    qwen3_xlam_style: true
    # qwen3_xlam_grammar_path: "config/grammars/qwen3_xlam.gbnf"   # optional; default above. When self-hosting: use --grammar-file and --reverse-prompt "</tool_call>".

# ——— Completion (per-request generation) ———
# Root completion applies to main_llm. Use completion_vision and completion_tool_selection (same keys as completion) to override when calling vision_llm or tool_selection_llm; they are merged with completion.
# All parameters below are sent with every chat completion call. Omit or comment out to use server default or llama_cpp fallback where noted.
# Fallbacks: max_tokens → llama_cpp.predict (so predict is the server default; completion.max_tokens overrides it per request); temperature/top_p/repeat_penalty → llama_cpp.temp / (none) / llama_cpp.repeat_penalty; stop → llama_cpp.stop.
# To reduce repetition (e.g. model echoing same footer): raise repeat_penalty, set presence_penalty/frequency_penalty > 0, or lower max_tokens.
# Single limit: max_tokens controls output length for every turn. Use 32768 (or higher) to avoid truncation of HTML slides, reports, long answers. If you omit max_tokens: Core uses llama_cpp.predict (server default), then 8192. Cloud providers (e.g. DeepSeek) may cap at 8192; Core does not override that.
# If replies still look truncated: (1) when reasoning_budget is not 0 we remove </think> from stop so the answer after <think> is generated; (2) raise max_tokens and llama_cpp.predict if finish_reason=length in logs.
#
# ——— Truncation checklist ———
# • finish_reason=length in logs → hit max_tokens; raise completion.max_tokens and llama_cpp.predict; ensure ctx_size >= prompt_tokens + max_tokens.
# • Cloud (mix mode): requests to cloud are capped at cloud_max_tokens_cap (default 8192). For long outputs we prefer local after document_read/run_skill; if you still get truncated on cloud, set cloud_max_tokens_cap higher only if your provider allows, or use main_llm_mode: local for long generations.
# • Stop sequences: completion.stop (e.g. <|im_end|>) can cut replies if the model emits them early. For Qwen with reasoning_budget != 0, </think> is removed from stop automatically.
# • Restart Core after changing llama_cpp.predict or ctx_size so the llama-server process is started with the new --predict and --ctx-size.
completion:
  max_tokens: 131071         # max tokens per response for all turns; 32768 helps avoid truncation on local. For cloud (DeepSeek, etc.) Core caps at cloud_max_tokens_cap (default 8192); set higher only if your provider allows (e.g. DeepSeek supports up to 32768).
  # cloud_max_tokens_cap: 8192   # optional; max_tokens sent to cloud = min(max_tokens, this). Default 8192. Set e.g. 32768 if your cloud provider allows and you want longer cloud replies (reduces truncation in mix mode).
  temperature: 0.5          # sampling temperature 0..2 (fallback: llama_cpp.temp)
  top_p: 1.0                # nucleus sampling 0..1
  presence_penalty: 0.4     # penalize tokens already in text (reduces repeated phrases; 0 = off)
  frequency_penalty: 0.3    # penalize by token frequency (reduces repetition; 0 = off)
  repeat_penalty: 2.0       # llama.cpp-style; higher = stronger anti-repetition (e.g. 1.5 → 2.0)
  seed: null                 # optional; int for reproducible sampling
  # Stop sequences: base list from config. Fallback: llama_cpp.stop when completion.stop not set. Same list is sent to every model (main_llm, tool_selection_llm, etc.).
  # "</tool_call>" is added automatically only on tool-decision turns. Omit it here to avoid truncating normal replies.
  # Qwen (e.g. Qwen3-4B-Function-Calling-Pro): use <|im_end|>. If using <think>, Core removes </think> from stop automatically — do not add </think> here.
  # gpt_oss (e.g. gpt-oss-20b): EOS is <|return|>; optional fallback <|endoftext|>. Use stop: ["<|return|>"] or ["<|return|>", "<|endoftext|>"].
  # Other GPT-style: may use </s> or <|endoftext|> depending on chat template. To support both Qwen and gpt_oss, use e.g. ["<|im_end|>", "<|return|>"].
  stop: ["<|im_end|>"]  #["<|return|>", "<|endoftext|>"]
  # Qwen / Qwen 3.5: configure in llama_cpp above (qwen_mode, qwen35_grammar_path, qwen35_use_grammar, reasoning_budget). Do not duplicate here.
  # disable_thinking_when_tools: false   # default: do NOT send enable_thinking: false (preserves server default; Qwen VL and others stay stable — tool_calls and no truncation). Set true only if you see empty content with reasoning_content full (e.g. 4B).
  # qwen_always_use_fallback_for_empty: true   # if reasoning_budget: -1 and you still see empty replies, set true to always use reasoning_content (or other alt keys) when content is empty. May occasionally show one line of internal reasoning. Default: false.
  # logit_bias: {}          # optional; dict of token id to bias (-100..100)
  # logit_bias: {}          # optional; dict of token id to bias (-100..100)
  # n: 1                    # number of completions (default 1)
  # response_format: null   # optional; e.g. { "type": "json_object" }
  # timeout: null            # optional; Unit: seconds
  #image_max_dimension: 512   # 0 = no resize. Set e.g. 1024 to resize images before sending to vision model (keeps aspect ratio; requires Pillow)

# Merged with completion when calling vision_llm. Same keys as completion; only set keys you want to override.
completion_vision:
  max_tokens: 2048           # vision replies often shorter; omit to use completion.max_tokens
  # cloud_max_tokens_cap: 8192
  temperature: 0.3           # slightly lower for concise image answers
  top_p: 1.0
  presence_penalty: 0.4
  frequency_penalty: 0.3
  repeat_penalty: 2.0
  seed: null
  stop: ["<|im_end|>"]       # match your vision model's EOS (e.g. ["<|return|>"] for gpt_oss)
  image_max_dimension: 512  # optional; overrides completion.image_max_dimension for vision only

# Merged with completion when calling tool_selection_llm. Same keys as completion; only set keys you want to override.
# completion_tool_selection:
#   max_tokens: 131071          # tool decisions usually short; omit to use completion.max_tokens
#   # cloud_max_tokens_cap: 8192
#   temperature: 0.2            # lower for more deterministic tool choice
#   top_p: 1.0
#   presence_penalty: 0.2
#   frequency_penalty: 0.2
#   repeat_penalty: 1.5
#   seed: null
#   stop: ["<|im_end|>"]       # match your tool_selection model (e.g. ["<|return|>"] for gpt_oss)

# ——— 2. Local models (llama.cpp server per model, or Ollama) ———
# Default: llama.cpp — path = GGUF path relative to model_path; Core starts one server per model.
# Optional per model: mmproj (vision), lora (adapter(s)), lora_base (optional base for LoRA).
#   mmproj: path to projector .gguf; llama-server -m <path> --mmproj <mmproj>
#   lora: single path or array of paths to LoRA adapter .gguf; each gets --lora <path> (multi-LoRA if supported)
#   lora_base: optional; only when the adapter requires a specific base; --lora-base <path>
# Optional supported_media: list of media types the model can handle — [image], [image, audio], or [image, audio, video].
#   If omitted: local model defaults to [] (text-only) unless mmproj is set, then [image]. Cloud model defaults to [image, audio, video].
#   Use supported_media to override (e.g. restrict cloud to [image] or enable image for a local model without mmproj).
# Paths are relative to model_path (same as path).
local_models:
  - id: Qwen3-Embedding-0.6B
    alias: Qwen3-Embedding-0.6B
    path: Qwen3-Embedding-0.6B-Q8_0.gguf  #Qwen3-Embedding-4B-Q4_K_M.gguf,  bge-m3-Q5_K_M.gguf
    host: 127.0.0.1
    port: 5066
    capabilities: [embedding]
  # Example vision model (uncomment and set paths): mmproj required; supported_media defaults to [image]
  # - id: llava_1_5_7b
  #   alias: LLaVA 1.5 7B
  #   path: llava/llava-v1.5-7b-model.gguf
  #   mmproj: llava/llava-v1.5-7b-mmproj.gguf
  #   # supported_media: [image]   # optional; default [image] when mmproj is set
  #   host: 127.0.0.1
  #   port: 5020
  #   capabilities: [Chat]
  # Example LoRA (uncomment): lora (single path or array), lora_base optional
  # - id: base_with_lora
  #   alias: Base + LoRA
  #   path: base/base-model.gguf
  #   lora: adapters/adapter-01.gguf
  #   # lora_base: base/base-model.gguf   # optional; only if adapter needs a specific base
  #   host: 127.0.0.1
  #   port: 5021
  #   capabilities: [Chat]
  # Multi-LoRA (if llama-server supports multiple --lora): use array
  #   lora: [adapters/a1.gguf, adapters/a2.gguf]
  - id: main_vl_model_2B
    alias: main_vl_model_2B
    path: Qwen3VL-2B-Instruct-Q4_K_M.gguf
    mmproj: mmproj-Qwen3VL-2B-Instruct-Q8_0.gguf
    host: 127.0.0.1
    port: 5025
    capabilities: [Chat]
    supported_media: [image]
    
  - id: main_vl_model_4B
    alias: main_vl_model_4B
    path: Qwen3VL-4B-Instruct-Q4_K_M.gguf
    mmproj: mmproj-Qwen3VL-4B-Instruct-F16.gguf
    host: 127.0.0.1
    port: 5026
    capabilities: [Chat]
    supported_media: [image]

  - id: main_vl_model_8B
    alias: main_vl_model_8B
    path: Qwen3-VL-8B-Instruct-Q4_K_M.gguf
    mmproj: mmproj-Qwen3-VL-8B-BF16.gguf
    host: 127.0.0.1
    port: 5027
    capabilities: [Chat]
    supported_media: [image]

  - id: gpt-oss-20b-Q4_K_M
    alias: gpt-oss-20b-Q4_K_M
    path: gpt-oss-20b-Q4_K_M.gguf
    host: 127.0.0.1
    port: 5050
    capabilities: [Chat]

  - id: Qwen3-4B-Function-Calling-Pro
    alias: Qwen3-4B-Function-Calling-Pro
    path: Qwen3-4B-Function-Calling-Pro.gguf
    host: 127.0.0.1
    port: 5051
    capabilities: [Chat]

  # - id: Qwen3.5-27B-Q4_K_M
  #   alias: Qwen3.5-27B-Q4_K_M
  #   path: Qwen3.5-27B-Q4_K_M.gguf
  #   host: 127.0.0.1
  #   port: 5028
  #   capabilities: [Chat]

  # - id: Qwen3.5-14B-A3B-Claud-4.6-Opus_q4_k_m
  #   alias: Qwen3.5-14B-A3B-Claud-4.6-Opus_q4_k_m
  #   path: Qwen3.5-14B-A3B-Claud-4.6-Opus_q4_k_m.gguf
  #   host: 127.0.0.1
  #   port: 5028
  #   capabilities: [Chat]

  - id: Qwen3.5-9B-Q5_K_M
    alias: Qwen3.5-9B-Q5_K_M
    path: Qwen3.5-9B-Q5_K_M.gguf
    host: 127.0.0.1
    port: 5029
    capabilities: [Chat]
  # Note: was 5024; use a different port so 27B and 9B can run at the same time (only one process per port).

  - id: Qwen3-8B-Q5_K_M
    alias: Qwen3-8B-Q5_K_M
    path: Qwen3-8B-Q5_K_M.gguf
    host: 127.0.0.1
    port: 5029
    capabilities: [Chat]

  - id: gemma_3_4b_it_4B
    alias: gemma_3_4b_it_4B
    path: gemma-3-4b-it-Q4_K_M.gguf
    mmproj: mmproj-gemma-3-4b-BF16.gguf
    host: 127.0.0.1
    port: 5030
    capabilities: [Chat]
    supported_media: [image]

  # Optional: Layer 3 classifier for mix mode (hybrid_router.slm.model). Small model (e.g. Qwen3-0.5B) on a separate port; Core starts it when main_llm_mode: mix and slm.enabled.
  - id: classifier_0_6b
    alias: classifier
    path: Qwen3-0.6B-Q5_K_M.gguf
    host: 127.0.0.1
    port: 5031
    capabilities: [Chat]

# Ollama (local): type: ollama, path = Ollama model name (e.g. qwen2.5:7b). Core does not start a process; ensure Ollama server is running (default 127.0.0.1:11434). See docs_design/OllamaAsLocalModelAndCLI.md.
  - id: Ollama-qwen2
    type: ollama
    alias: Ollama Qwen2
    path: qwen2.5:7b
    host: 127.0.0.1
    port: 11434
    capabilities: [Chat]


# ——— 3. Cloud models (LiteLLM; one service per entry, each host/port) ———
# api_key_name: env var name (e.g. GEMINI_API_KEY); Core uses that env var for the key. Optional api_key: set the key here instead of env (use for convenience only; avoid committing secrets).
# Start LiteLLM per model or use one proxy. See https://github.com/BerriAI/litellm and docs.litellm.ai/docs/providers
# Use as main LLM (Chat/Functioncall) or as embedding model (capabilities: [embedding]); main and embedding can mix local + cloud.
# Optional supported_media per entry: [image], [image, audio], or [image, audio, video]. If omitted, cloud models default to [image, audio, video].
cloud_models:
  # OpenAI (chat and embedding). supported_media: gpt-4o supports image only; gpt-4o-audio-preview supports audio only (see MediaSupportAndProviders.md).
