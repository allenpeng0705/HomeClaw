  #   capabilities: [Functioncall, Chat]
  # # Ollama (local; no API key)
  # - id: Ollama-qwen2
  #   alias: Ollama Qwen2
  #   path: ollama/qwen2.5:7b
  #   host: 127.0.0.1
  #   port: 4004
  #   capabilities: [Chat]
  # DeepSeek
  - id: DeepSeek-Chat
    alias: DeepSeek Chat
    path: deepseek/deepseek-chat
    host: 127.0.0.1
    port: 14005
