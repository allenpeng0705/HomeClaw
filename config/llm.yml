# ——— Media support (image / audio / video) for main_llm ———
# Add optional "supported_media" on the model entry used as main_llm. See docs_design/MediaSupportAndProviders.md.
# CLOUD: default [image, audio, video]; OpenAI: set per model (e.g. gpt-4o → [image]). LOCAL: default [] unless mmproj then [image].

# ——— Selected main and embedding model: local_models/<id> or cloud_models/<id> ———
# main_llm: optional when main_llm_mode is set. When mode is "local" we use main_llm_local; when "cloud" we use main_llm_cloud; when "mix" we use both per request.
# If the local llama.cpp server is not running (e.g. connection refused to 127.0.0.1:5022), use main_llm_mode: cloud so only cloud is used, or start the local server.
#main_llm: local_models/main_vl_model_4B
main_llm_mode: mix
main_llm_local: local_models/main_vl_model_4B
main_llm_cloud: cloud_models/DeepSeek-Chat
# ——— Stability: if tool turns often fail (empty content, 500s, cloud errors), set use_tool_selection_llm: false so main_llm does every turn, or set tool_selection_llm to the same as main_llm_local (e.g. 8B) so one model handles both "which tool" and "after tool result".
# tool_selection_llm: optional. When use_tool_selection_llm is true, every LLM call in the tool loop uses this model (tool selection + parameter extraction). Good for models fine-tuned on function calling (e.g. Qwen3-4B-toolcalling). When not used (default): main_llm handles everything — all tool selection, parameter extraction, and final replies.
# When using tool_selection_llm, the main model is still used for: (1) requests that have no tools (chat-only); (2) use_main_llm_for_direct_reply: true — direct (no-tool) replies; (3) long-output turn after document_read/run_skill (mix mode) to avoid cloud 8192 cap; (4) fallback when the tool-selection model fails or returns empty.
# Final response to user: when tool_selection_llm returns content only (no tool_calls)—whether on the first turn or after tools ran—the reply is sent to the user. By default (use_main_llm_for_direct_reply: true) Core then calls main_llm with the same messages (no tools) and uses that as the final response, so the user sees the main model's reply. Set use_main_llm_for_direct_reply: false to use tool_selection_llm's reply as-is.
#tool_selection_llm: local_models/Qwen3-4B-Function-Calling-Pro
#use_tool_selection_llm: false   # set false for stability (main_llm does all turns). Or set tool_selection_llm to main_llm_local (e.g. 8B) so one model handles tool turns.
# use_main_llm_for_direct_reply: true   # default true: when tool_selection_llm returns content only (no tool call), Core calls main_llm with same messages (no tools) and uses that as the final response to the user (first turn or after tools). Set false to keep tool_selection_llm's reply as-is.
#tool_selection_llm_host: 127.0.0.1   # host for tool_selection_llm; Core uses this when calling the tool-selection model (default 127.0.0.1)
#tool_selection_llm_port: 5031         # port for tool_selection_llm; run the model server on this port (default 5031)
# vision_llm: when main model has no vision (e.g. 27B text-only), use this model to describe images; description is injected into user message and main model replies. E.g. local_models/main_vl_model_2B. Omit or leave empty to save images and return a polite message instead.
vision_llm: local_models/main_vl_model_2B
# Mix mode routing: heuristic (Layer 1), semantic (Layer 2), SLM (Layer 3: classifier or perplexity). You can steer which model handles a request:
# • default_route: use when no layer selects (e.g. local = document_read/folder_list and simple tasks often go local first).
# • Heuristic: edit config/hybrid/heuristic_rules.yml — first matching rule wins; add local rules for read/list intents so read-document/list-folder tasks go to local.
# • Semantic: add example phrases to config/hybrid/semantic_routes.yml local_utterances so similar queries route to local (or cloud_utterances for cloud).
# • Long input: prefer_cloud_if_long_chars (e.g. 800) sends very long messages to cloud; set 0 to disable.
# • tool_loop_route_overrides: during the tool loop, when the last executed tool is in this map, use that route for the *next* LLM call only (one turn; then back to the selected model). If the overridden model fails, Core falls back to the other (local<->cloud). Tools not listed are unchanged. Only applies in mix mode. Value per tool: "local" or "cloud".
# All tools you can set (tool name -> use "local" or "cloud" for the turn after that tool runs):
#   # File / document (I/O done by tool; model often just formats or continues)
#   document_read: local    # read PDF/Office; next turn = summarize/format
#   file_read: local
#   file_write: local
#   file_edit: local
#   file_understand: local
#   file_find: local        # search files; next turn = present results
#   folder_list: local     # list directory; next turn = present results
#   save_result_page: local
#   get_file_view_link: local
#   apply_patch: local
#   markdown_to_pdf: local
#   # Skills / output
#   run_skill: local       # run skill (e.g. html-slides); next turn often long output
#   # Cron / reminders / scheduling
#   cron_schedule: local
#   cron_list: local
#   cron_remove: local
#   cron_update: local
#   cron_run: local
#   cron_status: local
#   remind_me: local
#   record_date: local
#   recorded_events_list: local
#   # Memory
#   memory_search: local
#   memory_get: local
#   append_agent_memory: local
#   append_daily_memory: local
#   agent_memory_search: local
#   agent_memory_get: local
#   memory_task_summary: local
#   memory_skill_search: local
#   memory_skill_get: local
#   memory_task_list: local
#   memory_write_public: local
#   memory_skill_publish: local
#   memory_skill_unpublish: local
#   memory_viewer_url: local
#   # Sessions / profile / channel
#   sessions_transcript: local
#   sessions_list: local
#   sessions_send: local
#   sessions_spawn: local
#   session_status: local
#   profile_get: local
#   profile_update: local
#   profile_list: local
#   channel_send: local
#   usage_report: local
#   # Web / search / browser (often need cloud for complex reasoning)
#   web_search: cloud
#   web_search_browser: cloud
#   tavily_extract: cloud
#   tavily_crawl: cloud
#   tavily_research: cloud
#   fetch_url: local
#   web_extract: local
#   web_crawl: local
#   browser_navigate: local
#   browser_snapshot: local
#   browser_click: local
#   browser_type: local
#   # Routing / system
#   route_to_tam: local
#   route_to_plugin: local
#   # Other
#   time: local
#   image: local
#   echo: local
#   platform_info: local
#   cwd: local
#   env: local
#   exec: local
#   process_list: local
#   process_poll: local
#   process_kill: local
#   http_request: local
#   webhook_trigger: local
#   models_list: local
#   agents_list: local
#   knowledge_base_search: local
#   knowledge_base_add: local
#   knowledge_base_remove: local
#   knowledge_base_list: local
hybrid_router:
  default_route: local
  show_route_in_response: true
  fallback_on_llm_error: true
  prefer_cloud_if_long_chars: 800
  # Use local for the turn after these tools (read/list done by tool; model only formats or continues).
  tool_loop_route_overrides:
    document_read: local
    folder_list: local
#   # File / document (I/O done by tool; model often just formats or continues)
#   document_read: local    # read PDF/Office; next turn = summarize/format
    file_read: local
    file_write: local
    file_edit: local
    file_understand: local
    file_find: local        # search files; next turn = present results
    folder_list: local     # list directory; next turn = present results
    save_result_page: local
    get_file_view_link: local
#   apply_patch: local
#   markdown_to_pdf: local
#   # Skills / output
#   run_skill: local       # run skill (e.g. html-slides); next turn often long output
#   # Cron / reminders / scheduling
#   cron_schedule: local
#   cron_list: local
#   cron_remove: local
#   cron_update: local
#   cron_run: local
#   cron_status: local
#   remind_me: local
#   record_date: local
#   recorded_events_list: local
#   # Memory
    memory_search: local
    memory_get: local
    append_agent_memory: local
    append_daily_memory: local
    agent_memory_search: local
    agent_memory_get: local
    memory_task_summary: local
    memory_skill_search: local
    memory_skill_get: local
    memory_task_list: local
    memory_write_public: local
    memory_skill_publish: local
    memory_skill_unpublish: local
#    memory_viewer_url: local
#   # Sessions / profile / channel
#   sessions_transcript: local
#   sessions_list: local
#   sessions_send: local
#   sessions_spawn: local
#   session_status: local
    profile_get: local
    profile_update: local
    profile_list: local
    channel_send: local
#   usage_report: local
#   # Web / search / browser (often need cloud for complex reasoning)
#   web_search: cloud
#   web_search_browser: cloud
#   tavily_extract: cloud
#   tavily_crawl: cloud
#   tavily_research: cloud
#   fetch_url: local
#   web_extract: local
#   web_crawl: local
#   browser_navigate: local
#   browser_snapshot: local
#   browser_click: local
#   browser_type: local
#   # Routing / system
#   route_to_tam: local
#   route_to_plugin: local
#   # Other
    time: local
#   image: local
#   echo: local
#   platform_info: local
    cwd: local
    env: local
    exec: local
    process_list: local
    process_poll: local
    process_kill: local
    http_request: local
#   webhook_trigger: local
#   models_list: local
#   agents_list: local
    knowledge_base_search: local
    knowledge_base_add: local
    knowledge_base_remove: local
    knowledge_base_list: local

  heuristic:
    enabled: true
    rules_path: config/hybrid/heuristic_rules.yml
  semantic:
    enabled: true
    threshold: 0.6   # min similarity (0..1) to accept the best route; higher = stricter, more fall-through
    routes_path: config/hybrid/semantic_routes.yml
  slm:
    enabled: true
    model: local_models/classifier_0_6b
    mode: perplexity
    perplexity_max_tokens: 10
    perplexity_threshold: -0.4   # logprob: avg >= this → local; higher (e.g -0.3) = more to cloud
# main_llm_language: list of allowed/preferred response languages (e.g. [zh, en]). First = primary for prompt loading and default when user language unknown.
main_llm_language: [en, zh]

embedding_llm: local_models/Qwen3-Embedding-0.6B

# Main and embedding server connection: Core always uses these host/port for the selected main LLM and embedding model.
# Per-model host/port in local_models above are for multi-model use (e.g. running several models on different ports later).
# If local model doesn't work: check logs for "unreachable" (server not running), "port already in use", or "exited quickly" (startup failed).
embedding_host: 127.0.0.1
embedding_port: 5066
# embedding_health_check_timeout_sec: 120   # seconds to wait for local embedding server; default 120
main_llm_host: 127.0.0.1
main_llm_port: 5023
# Cloud (LiteLLM) proxy: used for cloud-only and mix when route=cloud. Run LiteLLM on this host/port (e.g. litellm --port 14005).
cloud_llm_host: 127.0.0.1
cloud_llm_port: 14005

# Vision sidecar: when vision_llm is set (e.g. local_models/small_vision_2B), Core uses this host/port to call it for image description.
# Run the vision model server on this port so Core always knows where to reach it (or use on-demand below).
vision_llm_host: 127.0.0.1
vision_llm_port: 5024
vision_llm_start_on_demand: true   # default true: do not start vision at Core startup; start when first request needs vision, stop after use (or after idle). Saves memory when vision is rare. Set false to manage the vision server yourself.
vision_llm_idle_stop_seconds: 300 # after last vision use, stop the server after this many seconds (0 = stop as soon as the request finishes). Only when vision_llm_start_on_demand is true.
# Optional: resize images before sending to vision sidecar (max width or height). 0 = use completion.image_max_dimension only. E.g. 1024 for small vision models.
vision_image_max_dimension: 1024
