# =============================================================================
# Skills and plugins configuration
# =============================================================================
# This file is loaded by Core when core.yml sets:
#   skills_and_plugins_config_file: skills_and_plugins.yml
# Path is relative to the directory containing core.yml (config/).
# Only keys starting with skills_, plugins_, system_plugins_, or the key "tools"
# are read from this file; they override or supply values merged into the main config.
# Edit this file for all skill/plugin/tools settings; core.yml stays short.
#
# Optional keys (code defaults if omitted): skills_dir (default: skills),
# external_skills_dir (default: external_skills; empty to disable; same behavior as skills_dir; can be absolute path, e.g. /opt/skills, to use a folder outside the project),
# skills_extra_dirs ([]), skills_disabled ([]), skills_include_body_max_chars (0),
# plugins_extra_dirs ([]), system_plugins_start_delay (2.0). Add them here to override.
# =============================================================================

# --- Plugin list / routing block ---
# Max characters per plugin description in the routing block. 0 = no truncation (default).
# When using RAG or plugins_max_in_prompt, this only caps per-item length; set 512 or 300 to shrink prompt.
plugins_description_max_chars: 0

# --- Skills: vector search (RAG) ---
# When false (default): include ALL skills in the prompt. When true: create vector store, sync skills_dir, retrieve by query similarity.
# Kept off by default: RAG for skills often selects wrong skills (cross-lingual, short query). Turn on only when confident. Same policy for tools RAG (when implemented).
# See docs_design/SkillsAndPluginsSamePolicy.md.
skills_use_vector_search: false
# OpenClaw-style skill filter: when set, only these skill folder names are in the prompt. Empty = all skills (or RAG result).
# skills_filter: [html-slides-1.0.0, ppt-generation-1.0.0]

# --- Intent router (Phase 2/3): LLM-based query -> category -> filter tools and skills ---
# When enabled: one short LLM call classifies the user message; tools (and optionally skills) are filtered by category. No phrase tables — LLM does the classification.
# Multi-category: if the request needs several types of actions (e.g. search then save), the router may return two comma-separated categories; Core then uses the union of tools/skills from both. See docs_design/IntentRouter_CategoriesCoverage.md § Multi-category tasks.
# Phase 3.1: per category use "skills: [folder1, folder2]" to restrict which skills are in the prompt (skill_name enum then matches). Phase 3.3: verify_tool_selection + verify_tools to optionally verify exec/file_write before execution.
intent_router:
  enabled: true
  # Timeout (seconds) for the intent router LLM call. If the router does not respond in time (e.g. main LLM busy), we fall back to general_chat so the request does not hang. Default 25 when not set; set 0 to disable timeout.
  # timeout_seconds: 25
  # Full coverage: see docs_design/IntentRouter_CategoriesCoverage.md. Every category has a mapping so router is enough for tools/skills.
  categories: [search_web, list_files, get_file_link, read_document, create_slides, create_html_slides, generate_pdf, summarize_to_page, send_email, schedule_remind, open_url, memory, knowledge_base, image, general_chat, coding]
  # Short description per category so the router LLM can classify more accurately. Reply must still be the exact category name.
  category_descriptions:
    search_web: "User wants to search the web or look up information online."
    list_files: "User wants to list, browse, or find files or folders."
    get_file_link: "User wants to get a view/download link for a specific file (e.g. 'send me that file', '发给我 img1.png')."
    read_document: "User wants to read, summarize, or understand a specific document or file."
    summarize_to_page: "User wants a summary of a document as a viewable page (link), not necessarily as PDF."
    send_email: "User wants to send an email. The assistant will use a contacts list, compose a draft, and ask for confirmation before sending."
    create_slides: "User wants to create slides, a presentation, or PPT from content (generic; may be HTML or PowerPoint)."
    create_html_slides: "User wants to create HTML slides or a web-based slide deck from a document (not PowerPoint/PPT)."
    generate_pdf: "User wants to generate or export a PDF from a document (e.g. summarize to PDF, report to PDF). Markdown is generated first, then converted to PDF."
    schedule_remind: "User wants to set a reminder, schedule, recurring task, or record a date."
    open_url: "User wants to open a URL, visit a webpage, or navigate to a link."
    memory: "User wants to remember something, recall past context, or search memory."
    knowledge_base: "User wants to search or save something in their knowledge base."
    image: "User wants to generate, analyze, or describe an image, or to receive/send an image file (e.g. 发给我, send me that image)."
    general_chat: "General conversation, question, or intent that does not fit a specific category above."
    coding: "User wants to run code, edit files, use dev tools, or automate something."
  category_tools:
    search_web: { profile: minimal }
    # list_files: include get_file_view_link so "send me that file" / "发给我" can return a view link (path from folder_list/file_find).
    list_files: { tools: [folder_list, file_find, document_read, get_file_view_link] }
    # get_file_link: "发给我 img1.png" / "send me that file" — DAG runs get_file_view_link with path from user_message_path (resolved from prior folder_list via path_resolution_context).
    get_file_link: { tools: [get_file_view_link, folder_list, file_find] }
    read_document: { tools: [document_read, file_read, file_understand, folder_list, file_find, get_file_view_link] }
    create_slides: { profile: minimal, skills: [html-slides-1.0.0, ppt-generation-1.0.0] }
    # create_html_slides uses a DAG flow (document_read -> run_skill(html-slides) -> save_result_page). Allow those tools so the DAG runs without fallback.
    create_html_slides: { tools: [document_read, run_skill, save_result_page, file_read, file_understand], skills: [html-slides-1.0.0] }
    generate_pdf: { tools: [document_read, markdown_to_pdf] }
    summarize_to_page: { tools: [document_read, save_result_page] }
    send_email: { tools: [file_read, run_skill], skills: [imap-smtp-email] }
    schedule_remind: { tools: [remind_me, cron_schedule, cron_list, cron_remove, cron_update, record_date, recorded_events_list, route_to_tam, time] }
    open_url: { tools: [fetch_url, route_to_plugin, browser_navigate] }
    memory: { tools: [memory_search, memory_get, agent_memory_search, agent_memory_get, append_agent_memory, append_daily_memory] }
    knowledge_base: { tools: [knowledge_base_search, knowledge_base_add, knowledge_base_remove, knowledge_base_list] }
    # Include get_file_view_link so "发给我 img1.png" returns a view link; folder_list/file_find to resolve path if needed.
    image: { tools: [image, get_file_view_link, folder_list, file_find], skills: [image-generation-1.0.0] }
    # general_chat: greetings and open-ended chat; use minimal (time, web_search, folder_list, run_skill, remind_me, route_to_plugin) so "你好" etc. get ~6 tools, not 71.
    general_chat: { profile: minimal }
    coding: { profile: coding }
  # Optional: include recent chat turns so router can resolve "that document", "it", "the same". Trade-off: helps follow-ups, can dilute current intent. 0 = only current message (default).
  include_recent_turns: 0
  # When include_recent_turns > 0: max chars per message in recent context (default 300).
  # recent_turns_max_chars: 300
  # Phase 3.3: when true, before executing exec or file_write (or verify_tools list), ask LLM "Does this match user intent? Yes/No"; skip if No.
  # verify_tool_selection: false
  # verify_tools: [exec, file_write]
  # Fallback: add these tools to every category so narrow intents (e.g. search_web) can still save or list. See docs_design/IntentRouter_CategoriesCoverage.md § Fallbacks.
  # tools_always_included: [save_result_page, file_write, folder_list]

# --- Identity / capabilities shortcut (no LLM) ---
# When the user asks "what can you do?" or "你能为我做什么?", reply directly from workspace IDENTITY.md + TOOLS.md. Chatting is detected accurately: when intent_router is enabled, shortcut runs only when the router returns general_chat (chatting intent); then greeting/capabilities phrase+length decide the reply. When intent_router is disabled, phrase+length are checked early (no LLM).
identity_capabilities_shortcut:
  enabled: true
  # Max length (chars, after normalize) for greeting match. Only messages this short can trigger greeting_reply. 0 = no limit.
  greeting_max_length: 20
  # Max length (chars, after normalize) for capabilities match. Only messages this short can return identity+TOOLS.md. 0 = no limit.
  capabilities_max_length: 60
  # Greeting: exact match after normalize (strip + trim trailing punctuation). If the user message equals one of these, reply with greeting_reply and skip the LLM.
  greeting_phrases:
    - "你好"
    - "您好"
    - "hello"
    - "hi"
    - "hey"
    - "嗨"
  # Reply for greeting_phrases. If empty, a default bilingual greeting is used.
  greeting_reply: ""
  # Substring match (case-insensitive for ASCII). If the user message contains any phrase, return identity + capabilities from workspace.
  match_phrases:
    - "你能为我做什么"
    - "你能做什么"
    - "你能帮我做什么"
    - "你有什么功能"
    - "介绍你自己"
    - "你是谁"
    - "what can you do"
    - "what can you do for me"
    - "who are you"
    - "what are your capabilities"
    - "introduce yourself"

# --- Planner–Executor (optional): plan once → execute steps; fallback to ReAct on failure. See docs_design/PlannerExecutorAndDAG.md. ---
# When enabled: use planner for all intents except skip_planner_for_categories. Implemented step-by-step; set enabled: true when planner + executor are ready.
# DAG flows: when a flow is defined for the intent category, run the fixed flow (no planner call); else use planner or ReAct. See §3 in PlannerExecutorAndDAG.md.
planner_executor:
  enabled: true
  skip_planner_for_categories: [general_chat]
  # planner_llm: null   # null = use main_llm; or set LLM ref for planning
  # max_steps_per_plan: 12
  # max_replans: 2
  # re_plan_on_error: true
  # requires_final_summary: true
  # fallback_to_react_on_plan_failure: true
  # --- DAG flows (fixed chains per category). Trigger: category from intent router. create_html_slides = HTML slides only (differs from ppt-generation). ---
  # Path resolution: user_message_path extracts path from the message (documents/, share/, output/, images/, work/, downloads/, knowledge/, or bare filename like report.pdf). Default "documents/" is used only when no path is found.
  flows:
    # Generate PDF: read document → LLM produces Markdown → markdown_to_pdf. Path: from message (any sandbox folder or bare filename) or default documents/ when none found.
    generate_pdf:
      trigger: category
      category: generate_pdf
      steps:
        - tool: document_read
          args_from:
            path: [user_message_path, "documents/"]
        - tool: markdown_to_pdf
          args_from:
            content: [llm_markdown_from_step_1]
            path: [user_message_path_pdf, "output/report.pdf"]
    # File listing: folder_list with path from message (documents, images, output, ...) or default ".".
    list_files:
      trigger: category
      category: list_files
      steps:
        - tool: folder_list
          args_from:
            path: [user_message_folder, "."]
    # Get file link: user asked to "send me that file" / "发给我 img1.png". Path from user message, resolved from prior folder_list via path_resolution_context (e.g. img1.png → images/img1.png).
    get_file_link:
      trigger: category
      category: get_file_link
      steps:
        - tool: get_file_view_link
          args_from:
            path: [user_message_path, ""]
    # Web search: query from user message → web_search. If result short: summarize and reply directly; if long: save as markdown page and return link.
    search_web:
      trigger: category
      category: search_web
      when_step_skipped_return_summary_of_previous: true
      steps:
        - tool: web_search
          args_from:
            query: [user_message_text, ""]
        - tool: save_result_page
          run_only_if_previous_step_longer_than: 2000
          args_from:
            title: [llm_from_step_1, "Search results"]
            content: [result_of_step_1]
          args:
            format: "markdown"
    # summarize_to_page DAG flow (simple): read document -> LLM summary -> save_result_page
    summarize_to_page:
      trigger: category
      category: summarize_to_page
      steps:
        - tool: document_read
          args_from:
            path: [user_message_path, "documents/"]
        - tool: save_result_page
          args_from:
            title: [llm_from_step_1, "Summary"]
            content: [llm_markdown_from_step_1]
          args:
            format: "markdown"
    # Send email: read contacts from predefined Markdown file → LLM composes draft → show draft and ask user to reply "send" or "cancel". Actual send on next turn via skill external_skills/imap-smtp-email: run_skill(skill_name='imap-smtp-email', script='smtp.js', args=['send', '--to', '<email>', '--subject', '<subject>', '--body', '<body>']). Set contacts_path (path to contacts.md under sandbox, e.g. share/contacts.md).
    send_email:
      trigger: category
      category: send_email
      contacts_path: "share/contacts.md"
      steps:
        - tool: file_read
          args_from:
            path: [flow_config:contacts_path, "share/contacts.md"]
        - output_only: [llm_compose_email_from_step_1]
          append: "\n\n---\nReply **send** to send this email, or **cancel** to discard."

skills_vector_collection: homeclaw_skills   # Chroma collection name (default: homeclaw_skills)
skills_max_retrieved: 10                     # When using vector search: max skills from RAG before threshold + cap (default: 10)
skills_max_in_prompt: 5                      # When skills_use_vector_search=true: cap skills in prompt (default: 5); ignored when false
# Min similarity (0..1) to keep a skill; below this, RAG drops it. 0.5 helps cross-lingual/short queries (e.g. Chinese "创建图片").
# Code default is 0.0; 0.3–0.5 improves selection for mixed-language prompts.
skills_similarity_threshold: 0.5
skills_refresh_on_startup: true              # When skills_use_vector_search: resync skills_dir → vector DB on Core startup (default: true)
skills_test_dir: ""                          # Optional: test folder for full sync every time (id = test__<folder>); default ""
skills_incremental_sync: false               # When true: only process skill folders not already in vector store (default: false)

# --- Skills: body in prompt ---
# When true (OpenClaw-style): inject only name, description, and location (skill:<folder>) into the prompt; the model reads SKILL.md on demand via file_read(path='skill:<folder>'). Reduces context tokens; set to true to save tokens.
# When false (default): inject name, description, keywords, and optionally body; model infers script/args from the text.
skills_use_location_only: false
# For these skill folders only (when skills_use_location_only is false), include SKILL.md body (and USAGE.md) in the prompt so the model can answer "how do I use this?" and follow the workflow (e.g. Finder uses html-slides and ppt-generation to complete tasks).
# Set skills_include_body_max_chars > 0 (e.g. 8000) in core.yml or below to cap body length; 0 = no truncation (default).
skills_include_body_for: [maton-api-gateway-1.0.0, x-api-1.0.0, meta-social-1.0.0, html-slides-1.0.0, ppt-generation-1.0.0]

# --- Skills / plugins: force-include rules ---
# When the user query matches a rule pattern, Core adds the rule's instruction and (for skills) optional skill folders or plugin list.
# Rules with folders: [] and optional plugins: [id] + auto_invoke run that tool when the model returns no tool_calls (helps local models).
# Plugin capabilities (e.g. homeclaw-browser) are invoked via route_to_plugin(plugin_id=..., capability_id=..., parameters=...).
skills_force_include_rules:
  # --- Tool-only fallbacks (folders: [], auto_invoke when no tool_calls) ---
  - patterns:
    - "list\\s+(file|files|directory|folder|content)|列出|目录|哪些文件|文件列表|我的文件|看看文件|显示文件|目录下|有什么文件"
    - "show\\s+(file|files|directory|folder)|view\\s+(file|directory)|folder\\s+(list|content)|file\\s+list"
    folders: []
    auto_invoke:
      tool: folder_list
      arguments: { path: "" }
  - patterns:
    - "find\\s+(file|files)|search\\s+(for\\s+)?file|file_find|查找文件|搜索文件|找文件"
    folders: []
    auto_invoke:
      tool: file_find
      arguments: { path: "", pattern: "*" }
  - patterns:
    - "search\\s+(the\\s+)?web|search\\s+for\\s+.+|google\\s+.+|网上搜|搜索一下|查一下|搜一下|search\\s+online"
    folders: []
    auto_invoke:
      tool: web_search
      arguments: { query: "{{query}}", count: 5 }
  # --- homeclaw-browser plugin: open URL / navigate / open browser (one rule, one fallback) ---
  - patterns:
    - "open\\s+https?://|navigate\\s+to\\s+https?://|go\\s+to\\s+https?://|open\\s+[a-zA-Z0-9][-a-zA-Z0-9.]*\\.[a-zA-Z]{2,}|打开.*http|访问.*http|打开.*\\.(com|cn|org|net)|访问.*\\.(com|cn|org|net)"
    - "open\\s+(the\\s+)?browser|打开.*浏览器|打开.*网页|browser_navigate"
    - "navigate\\s+to"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser', capability_id='browser_navigate', parameters={\"url\": \"<URL or from user>\"}). Do not say you have no browser."
    auto_invoke:
      tool: route_to_plugin
      arguments:
        plugin_id: homeclaw-browser
        capability_id: browser_navigate
        parameters: { url: "{{query}}" }
  # --- homeclaw-browser: list nodes ---
  - patterns:
    - "list\\s+node|node\\s+list|what\\s+node|节点列表|有哪些节点|connected\\s+node"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser', capability_id='node_list'). Do not say you have no browser."
    auto_invoke:
      tool: route_to_plugin
      arguments:
        plugin_id: homeclaw-browser
        capability_id: node_list
        parameters: {}
  # --- homeclaw-browser: page snapshot / take photo / 拍照 / 截图 ---
  - patterns:
    - "take\\s+(a\\s+)?(photo|picture|snapshot)|拍.*照|截图"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser', capability_id='browser_snapshot' for page, or 'node_camera_snap'/'node_camera_clip' for a node; pass node_id when needed). Do not say you have no browser."
    auto_invoke:
      tool: route_to_plugin
      arguments:
        plugin_id: homeclaw-browser
        capability_id: browser_snapshot
        parameters: {}
  # --- homeclaw-browser: click, type, fill, scroll (instruction only; needs ref/selector from browser_snapshot) ---
  - patterns:
    - "click\\s+(the\\s+)?(button|link|element)|browser_click|点击|点一下"
    - "type\\s+(into|in)\\s+|fill\\s+(the\\s+)?(input|field)|browser_type|browser_fill|输入|填写"
    - "scroll\\s+(down|up)?|browser_scroll|滚动"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser'): browser_click (ref or selector from browser_snapshot), browser_type/browser_fill (ref/selector, text), browser_scroll (direction). Call browser_snapshot first to get refs. Do not say you have no browser."
  # --- homeclaw-browser: close session ---
  - patterns:
    - "close\\s+(browser|session)|browser_close_session|关闭.*浏览器|关闭.*会话"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser', capability_id='browser_close_session'). Do not say you have no browser."
    auto_invoke:
      tool: route_to_plugin
      arguments:
        plugin_id: homeclaw-browser
        capability_id: browser_close_session
        parameters: {}
  # --- homeclaw-browser: settings (color scheme, geolocation, timezone, locale, device, offline, headers, credentials) ---
  - patterns:
    - "dark\\s+mode|light\\s+mode|color\\s+scheme|browser_set_color_scheme|深色|浅色"
    - "geolocation|set\\s+location|browser_set_geolocation|地理位置|定位"
    - "timezone|browser_set_timezone|时区"
    - "locale|browser_set_locale|语言.*设置"
    - "viewport|device\\s+emulation|browser_set_device|iPhone|iPad|Pixel"
    - "offline\\s+mode|browser_set_offline|离线"
    - "extra\\s+headers|browser_set_extra_headers"
    - "credentials|basic\\s+auth|browser_set_credentials"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser'): browser_set_color_scheme (dark/light), browser_set_geolocation, browser_set_timezone, browser_set_locale, browser_set_device, browser_set_offline, browser_set_extra_headers, browser_set_credentials. Pass required parameters. Do not say you have no browser."
  # --- homeclaw-browser: canvas update ---
  - patterns:
    - "update\\s+(the\\s+)?canvas|show\\s+on\\s+canvas|canvas_update|更新.*画布|画布.*显示|推到画布"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser', capability_id='canvas_update', parameters with document/title/blocks). Do not say you have no browser."
    auto_invoke:
      tool: route_to_plugin
      arguments:
        plugin_id: homeclaw-browser
        capability_id: canvas_update
        parameters: {}
  # --- homeclaw-browser: node actions (command, notify, camera_snap/clip, screen_record, location; pass node_id from user) ---
  - patterns:
    - "node_command|send\\s+command\\s+to\\s+node|节点.*命令"
    - "node_notify|notify\\s+node|notification\\s+on\\s+node|节点.*通知"
    - "take\\s+photo\\s+on\\s+node|node_camera_snap|节点.*拍照|camera\\s+snap"
    - "record\\s+video\\s+on\\s+node|node_camera_clip|节点.*录像|camera\\s+clip"
    - "node_screen_record|screen\\s+record\\s+on\\s+node|节点.*录屏"
    - "node_location_get|node\\s+location|location\\s+of\\s+node|节点.*位置"
    folders: []
    plugins: [homeclaw-browser]
    instruction: "Use route_to_plugin(plugin_id='homeclaw-browser'): node_command (node_id, command, params), node_notify (node_id, title, body), node_camera_snap (node_id), node_camera_clip (node_id, duration, includeAudio), node_screen_record (node_id), node_location_get (node_id). Get node_id from node_list. Do not say you have no browser."
  # --- PPT / PowerPoint (skill with script create_pptx.py) ---
  - patterns:
    - "生成.*PPT|做个PPT|做.*PPT|生成.*演示|create.*ppt|make.*presentation|powerpoint|幻灯片.*生成|\\.pptx|做.*幻灯片|从.*做.*PPT"
    folders: [ppt-generation-1.0.0]
    instruction: "User asked for a PPT or PowerPoint. Use run_skill(skill_name='ppt-generation-1.0.0', script='create_pptx.py', args=['--capability', 'outline'|'source'|'presentation'|'documents', ...]). See skill body for args. Core appends the open link to the result; include it in your reply."
  # --- Skills: Maton, HTML slides, X, Meta, image, summarize (force-include so local model gets strong instruction) ---
  - patterns:
    - "slack|send.*slack|slack.*(message|channel)"
    - "linkedin|领英|发.*linkedin|post.*linkedin|发送.*linkedin"
    - "outlook|(outlook|microsoft).*(email|mail|calendar|contact)"
    - "hubspot|(hubspot).*(contact|deal|company)"
    - "notion|(notion).*(database|page|block)"
    - "gmail|google.*mail|(gmail).*(send|list|search)"
    - "stripe|(stripe).*(customer|payment|charge|invoice)"
    - "google.*calendar|calendar.*event|(google).*(calendar)"
    - "google.*(sheet|spreadsheet)|(sheet|spreadsheet).*row"
    - "salesforce|(salesforce).*(contact|opportunity|soql)"
    - "airtable|(airtable).*(base|record|table)"
    - "calendly|(calendly).*(event|availability|schedule)"
    - "github|(github).*(repo|issue|pr|pull.*request)"
    - "maton|api gateway|gateway\\.maton|maton\\.ai"
    folders: [maton-api-gateway-1.0.0]
    instruction: "User asked to use an external service (Slack, LinkedIn, Outlook, HubSpot, Notion, Gmail, Stripe, Google Calendar/Sheets, Salesforce, Airtable, Calendly, GitHub, etc.). Use run_skill(skill_name='maton-api-gateway-1.0.0', script='request.py') with app and path from the maton skill body (Supported Services table and references/). Do not claim the action was done without calling the skill. For LinkedIn post: GET linkedin/rest/me then POST linkedin/rest/posts with commentary."
  - patterns:
    - "乔布斯|极简.*演示|HTML\\s*slides|html\\s*slides|幻灯片|生成.*HTML|做.*幻灯片"
    folders: [html-slides-1.0.0]
    instruction: "User asked for 乔布斯-style or HTML slides. Generate a **multi-slide deck** (8–20 distinct slides, one idea per slide), not a single long page. Follow the html-slides skill steps (refine script → titles → structure → full HTML), then save_result_page(title=..., content=<full HTML>, format='html') or file_write to output/ and return the link. Do not say you have no skill."
  - patterns:
    - "发.*[Xx]|发推|发一条.*[Xx]|post.*tweet|tweet.*post|发.*twitter"
    folders: [x-api-1.0.0, social-media-agent-1.0.0]
    instruction: "User asked to post to X/Twitter. Use x-api-1.0.0 (run_skill with request.py) if you have X_ACCESS_TOKEN, else social-media-agent-1.0.0 (browser). Do not say you have no skill."
  - patterns:
    - "facebook|instagram|meta\\s+post|发.*facebook|发.*instagram|post.*(facebook|instagram)"
    folders: [meta-social-1.0.0]
    instruction: "User asked to post to Facebook or Instagram. Use run_skill(skill_name='meta-social-1.0.0', ...) per the skill body. Do not say you have no skill."
  - patterns:
    - "generate.*image|create.*image|画.*图|生成.*图|来一张图|做.*图|创建图片|画一张"
    folders: [image-generation-1.0.0]
    instruction: "User asked to generate or create an image. Call run_skill(skill_name='image-generation-1.0.0', script='generate_image.py', args=['--prompt', '<description>']). Do not say no image tool."
  - patterns:
    - "summarize|总结|摘要|概括|summarise|概括一下"
    folders: [summarize-1.0.0]
    instruction: "User asked to summarize. Use run_skill(skill_name='summarize-1.0.0', ...) or the summarize CLI / web_search as needed. Do not say you have no skill."
  - patterns:
    - "发封?邮件|发送邮件|发邮件|send\\s+email|write\\s+email|mail\\s+to"
    folders: [imap-smtp-email]
    instruction: "User asked to send or write an email. Use run_skill(skill_name='imap-smtp-email', script='smtp.js', args=['send', '--to', '<email>', '--subject', '<subject>', '--body', '<body>']). Do not claim the email was sent without calling the skill."
    auto_invoke:
      tool: run_skill
      arguments:
        skill_name: imap-smtp-email
        script: smtp.js
        args: ["send-from-message", "{{query}}"]
  # Deep / cited web research (external_skills/deep-research-workflow/SKILL.md — uses tavily_research, web_search, fetch_url)
  - patterns:
    - "deep\\s+research|in-?depth\\s+research|research\\s+report|comprehensive\\s+research|literature\\s+review|cited\\s+sources"
    - "深度调研|调研报告|详细调研|全面调研|文献综述|引用来源"
    folders: [deep-research-workflow]
    instruction: "User wants thorough web research with sources. Follow skill deep-research-workflow: prefer tavily_research(input=<question>) if configured; else web_search + fetch_url; respect budgets in SKILL.md; answer with [1][2] citations and ### Sources. Do not use run_skill as the only action—call research tools, then write the report."

# --- Plugins: vector search (RAG) ---
# When false (default): include ALL plugins in the routing block. When true: vector store + RAG to pick top-N.
plugins_use_vector_search: false
plugins_vector_collection: homeclaw_plugins   # Chroma collection (default: homeclaw_plugins)
plugins_max_retrieved: 10                     # When using vector search: max plugins from RAG (default: 10)
plugins_max_in_prompt: 15                     # When plugins_use_vector_search=true: cap plugins in prompt (default in code: 5); ignored when false
plugins_similarity_threshold: 0.0            # Min similarity to keep a plugin (0..1); default 0.0
plugins_refresh_on_startup: true             # When plugins_use_vector_search: resync plugin list to vector DB on startup (default: true)
# Legacy plugin force-include by pattern; definitions moved to skills_force_include_rules (folders: [] + plugins: [id]) so one place controls both.
plugins_force_include_rules: []

# --- System plugins (system_plugins/) ---
# When true, Core starts and registers plugins in system_plugins/ (e.g. node server.js, register.js) so one command runs Core + plugins.
# See system_plugins/README.md. Code default: false.
system_plugins_auto_start: true
# Optional allowlist by plugin id (folder name under system_plugins/). Empty = start all discovered. Default: [].
system_plugins: [homeclaw-browser]
# Per-plugin env vars (plugin_id → { VAR: "value" }). Values are stringified (true→"true", false→"false").
# Code default: {}. system_plugins_start_delay (default 2.0 sec) can be set in core.yml if needed.
system_plugins_env:
  homeclaw-browser:
    BROWSER_HEADLESS: false

# --- Trae Agent (experimental) ---
# When false (default): Trae Bridge plugin is not registered, TRAE_AGENT_* is not passed to the bridge, and preset "trae" replies with a hint. Set true only if you use Trae Agent (trae-cli); see docs/cursor-claude-code-bridge.md §4.
trae_agent_enabled: false

# --- Cursor Bridge (external_plugins/cursor_bridge) ---
# When true, Core starts the Cursor Bridge on startup. If the bridge reports "agent not found", set cursor_bridge_agent_path to the full path (PowerShell: (Get-Command agent).Source).
cursor_bridge_auto_start: true
# cursor_bridge_port: 3104   # optional; default 3104; must match plugins/CursorBridge/plugin.yaml config.base_url
# cursor_bridge_agent_path: "C:\\Users\\You\\AppData\\Local\\Programs\\cursor\\agent.exe"   # optional; use when Core starts the bridge and agent is not in Core's PATH
# cursor_bridge_cursor_cli_path: "C:\\Users\\You\\AppData\\Local\\Programs\\cursor\\cursor.cmd"   # optional; use when "open project" opens File Explorer instead of Cursor (PowerShell: (Get-Command cursor).Source)
# cursor_bridge_cursor_api_key: "your-cursor-api-key"   # optional; use when agent says "Authentication required" (or set CURSOR_API_KEY in env before starting Core). Prefer env for secrets.
# cursor_bridge_bridge_api_key: "set-a-random-secret"   # optional; protects the bridge HTTP API. When set, Core starts bridge with CURSOR_BRIDGE_API_KEY and sends X-HomeClaw-Bridge-Key on calls.
cursor_bridge_forward_logs: true   # set true to see bridge/agent logs in Core's terminal (debug "Agent exited with code 1")
cursor_bridge_claude_settings_path: "C:\\Users\\PS\\.claude\\settings.json"   # optional; full path to Claude Code settings.json so the bridge loads auth/env from that file (fixes 401 when bridge runs under a different user)
#cursor_bridge_trae_agent_path: "D:\\mygithub\\HomeClaw\\tools\\trae-agent\\.venv\\Scripts\\trae-cli.exe"   # optional; full path to trae-cli (from clone: uv sync then .venv\Scripts\trae-cli.exe, or after pip install -e .)
#cursor_bridge_trae_agent_config: "D:\\mygithub\\HomeClaw\\tools\\trae-agent\\trae_config.yaml"   # optional; full path to trae_config.yaml (API key + model). See github.com/bytedance/trae-agent

# --- Claude Code (CLI) via the same bridge ---
# claude_code_path: "C:\\Users\\You\\AppData\\Local\\Programs\\claude\\claude.cmd"   # optional; PowerShell: (Get-Command claude).Source
# claude_code_api_key: "your-anthropic-api-key"   # optional; prefer env ANTHROPIC_API_KEY for secrets

# --- Trae Agent (github.com/bytedance/trae-agent) via the same bridge ---
# Trae Bridge runs trae-cli for headless coding tasks. Install: git clone that repo, cd trae-agent, uv sync; create trae_config.yaml with API key (see repo README). Set cursor_bridge_trae_agent_path to trae-cli (e.g. .venv/Scripts/trae-cli.exe on Windows; use full path so the bridge finds it when Core starts it). Windows: .exe or .cmd in Scripts both work; trae-agent's bash tool may need Git Bash/WSL.

# --- Tool layer (used when use_tools: true) ---
# Built-in tools: time, cron_*, sessions_*, memory_*, file_*, folder_list, fetch_url, web_search, browser_*,
# exec, process_*, run_skill, run_plugin, image, channel_send, etc. Only keys below are read by the tool layer.
# tool_timeout_seconds: per-tool execution timeout (seconds); 0 = no timeout. Core reads it into CoreMetadata.tool_timeout_seconds.
# large_result_summarize_threshold_chars: when last tool result length exceeds this, LLM is instructed to summarize and/or save_result_page (default 6000; 0 = disabled). See docs_design/DeepAgentsComparisonAndLearnings.md.
tools:
  # OpenClaw-style tool profiles: only tools in the selected profile(s) are sent to the LLM. Reduces wrong tool selection. Omit or "full" = all tools.
  # profile: "full"   # full | minimal | messaging | coding. Or use profiles: [messaging, coding] for union.
  # profiles: []
  # When > 0: tool descriptions sent to the LLM are shortened (use ToolDefinition.short_description if set, else truncate to this many chars at sentence boundary). Helps local/smaller LLMs select tools more accurately. 0 = full description (default).
  # description_max_chars: 200
  # When true (default): inject few-shot tool selection examples (User / Thought / Call) from config/prompts/tools/selection_examples.yml into the system prompt. Helps local/Qwen models map natural language to the right tool.
  # tool_selection_examples: true
  # When true (default): never auto-invoke tools when the model returned no tool_calls. Rely on the model to decide; no our own if-else to run tools. When false: allow legacy fallbacks (force_include, remind_me, route_to_plugin, folder_list, etc.) when model didn't call a tool.
  strict_fallback: true
  # When last result length exceeds this (chars), inject instruction to summarize and/or save_result_page. Default 6000; 0 = disabled.
  # large_result_summarize_threshold_chars: 6000
  # MCP (Model Context Protocol) client: call external MCP servers via mcp_call and mcp_list_tools. Optional: pip install mcp.
  # See docs/mcp.md. Set auto_register_claude_code: true to have Core add the claude-code server at startup (no need to list it in servers).
  mcp:
    enabled: true
    auto_register_claude_code: true   # when true, Core enables MCP and adds server_id "claude-code" (claude mcp serve) at startup if not already in servers
    servers:
      claude-code:
        transport: stdio
        command: claude
        args: [mcp, serve]
        env: {}
  #     my-server:
  #       transport: stdio
  #       command: python
  #       args: [path/to/mcp_server.py, --transport, stdio]
  #     remote-server:
  #       transport: sse
  #       url: http://localhost:8000/sse
  #       timeout_seconds: 30
  #     # Claude Code as MCP server: exposes Claude Code's built-in tools (Read, Write, Edit, Bash, Task, WebFetch, etc.).
  #     # Requires Claude Code CLI installed; use server_id "claude-code" in mcp_list_tools / mcp_call. See docs/cursor-claude-code-bridge.md.
  #     claude-code:
  #       transport: stdio
  #       command: claude
  #       args: [mcp, serve]
  #       # env: {}   # optional; e.g. ANTHROPIC_API_KEY if not in system env. On Windows use full path to claude.cmd if needed.
  # Phase 3.4: RAG for tools — when true, retrieve tools by query similarity (reuse skills RAG infra). Default false; off by default like skills RAG (low confidence in retrieval).
  tools_use_vector_search: false
  # tools_vector_collection: homeclaw_tools
  # tools_max_retrieved: 10
  # tools_similarity_threshold: 0.0
  # tools_refresh_on_startup: true
  # Qwen / Qwen 3.5: configure in llm.yml under llama_cpp only (qwen_mode, qwen35_grammar_path, qwen35_use_grammar). Do not set qwen_model or qwen35_* here.
  # Optional when using Qwen: tool_temperature, disable_thinking_when_tools, qwen3_tool_format_instruction.
  # exec: allowed command names. Empty = platform default (Unix: ls, cat, pwd; Windows: dir, type, cd).
  exec_allowlist: []
  # --- Interactive sessions (PTY/ConPTY): shells and dev-bridge agent consoles. See docs/interactive-sessions.md. ---
  # Max concurrent interactive sessions per user (default 3). Enforced by Core and bridge.
  # interactive_max_sessions_per_user: 3
  # Max characters kept in each session's output buffer; older output is trimmed (default 200000).
  # interactive_max_buffer_bytes: 200000
  # Idle TTL in seconds before a session can be garbage-collected (default 1800). Not yet enforced; reserved for future cleanup.
  # interactive_idle_ttl_sec: 1800
  # Allowed commands for interactive_start. Empty or omitted = use exec_allowlist. List of regex patterns (e.g. ["bash", "powershell", "sh", "cmd"]).
  # interactive_allowed_commands: []
  # markdown_to_pdf: VMPrint (github.com/cosmiciron/vmprint). install.sh/install.ps1 clone to tools/vmprint; if you installed manually as tools/vm_print, set vmprint_dir to "tools/vm_print" (or use absolute path).
  markdown_to_pdf:
    vmprint_dir: "tools/vmprint"   # or "tools/vm_print"; must contain draft2final/ and have npm install run
  exec_timeout: 120   # seconds
  # Max characters returned by file_read when the tool does not pass max_chars. Increase for long PDFs/documents.
  file_read_max_chars: 5000000
  # run_skill: if set, only these script names under skill/scripts/ are allowed. [] = allow all.
  run_skill_allowlist: []
  # run_skill: .py scripts run in subprocess by default; list skill folder names here to run those .py in Core's process.
  run_skill_py_in_process_skills: []
  run_skill_timeout: 300   # seconds
  # run_plugin: list plugin_ids to run in Core's process (default: subprocess). Subprocess uses a temp file for payload so large parameters work for all plugins; only add here if a plugin needs Core refs or must run in-process.
  run_plugin_in_process_plugins: []
  run_plugin_timeout: 300   # seconds

  max_tool_rounds: 30
  # web_search: provider (tavily, duckduckgo, google_cse, bing, brave, serpapi). Tavily/brave need api_key here or env.
  web:
    search:
      provider: tavily   # duckduckgo (no key) | google_cse | bing | brave | serpapi | tavily
      duckduckgo: {}
      google_cse:
        api_key: ""
        cx: ""
      bing:
        api_key: ""
      brave:
        api_key: ""
        search_type: web   # web | news | video | image
      serpapi:
        api_key: ""
        engine: google   # google | bing | baidu
      tavily:
        api_key: ""   # set your Tavily API key here or use TAVILY_API_KEY env var
        search_depth: basic   # basic | fast | advanced | ultra-fast
        topic: general        # general | news | finance
        time_range: ""        # day | week | month | year (empty = no filter). When user asks for "recent/latest" (e.g. 最近), code auto-uses month if empty; set week for current week.
      fallback_no_key: true   # use DuckDuckGo when primary provider has no key or fails
      fallback_max_results: 5
  # true = use system plugin homeclaw-browser (route_to_plugin); false = register built-in browser_* tools (Playwright).
  browser_use_plugin: true
  browser_enabled: true   # when browser_use_plugin false: built-in tools only if true
  browser_headless: false # when using built-in tools: false to show window (local testing)
  tool_timeout_seconds: 0   # per-tool timeout (seconds); 0 = no timeout. For long PDF/summarize use 300–600.
  # get_file_view_link: when user asks for a file or system sends a file, we always return a view/download link. For images: if size <= max_image_size_for_inline we also attach the image so the client can show it directly; above that we send only the link.
  get_file_view_link:
    max_image_size_for_inline: 2097152   # bytes (2 MiB). Images at or below this size are sent inline; larger images get link only. Set 0 to never send images inline (link only).
  # max_tool_rounds: max LLM rounds in the tool loop (default 30). Complex tasks (e.g. document_read → run_skill → save_result_page) may need many rounds; set higher if needed.
  # Use tool result as final response and skip the second LLM call. These are the default lists (Core uses same if omitted).
  # Plugins (e.g. homeclaw-browser): invoked via route_to_plugin; result is always used as final response (no second LLM). PPT is now a skill (ppt-generation-1.0.0) invoked via run_skill.
  use_result_as_response:
    enabled: true
    # Skills in this list always get a second LLM call (e.g. to confirm in natural language). Empty = use result for all skills.
    # Skills that always get a second LLM round (never use raw tool result as final response). Instruction-only skills (no script) are handled by default in Core; list here only when you need a second LLM for other reasons (e.g. richer reply).
    skills_results_need_llm: [maton-api-gateway-1.0.0, x-api-1.0.0, meta-social-1.0.0]
    # Tools whose result is raw content; always run second LLM to synthesize. Include folder_list and file_find so their JSON is never used as final reply.
    needs_llm_tools:
      - document_read
      - file_read
      - file_understand
      - folder_list
      - file_find
      - web_search
      - tavily_extract
      - tavily_crawl
      - tavily_research
      - memory_search
      - memory_get
      - agent_memory_search
      - agent_memory_get
      - knowledge_base_search
      - fetch_url
      - web_extract
      - web_crawl
      - browser_navigate
      - web_search_browser
      - image
      - sessions_transcript
      - cron_list
      - cron_status
      - cron_schedule
      - cron_remove
      - cron_update
      - cron_run
      - remind_me
    # Tools whose result can be the final reply when short (length <= max_self_contained_length). save_result_page/get_file_view_link use result when it contains /files/out?token=.
    # Exclude folder_list and file_find: they return JSON; we need a second LLM turn to format it (or post-process), so the user does not see raw JSON.
    self_contained_tools:
      - run_skill
      - time
      - profile_get
      - profile_list
      - models_list
      - agents_list
      - platform_info
      - cwd
      - env
      - session_status
      - sessions_list
      - sessions_send
      - sessions_spawn
      - record_date
      - recorded_events_list
      - profile_update
      - append_agent_memory
      - append_daily_memory
      - usage_report
      - channel_send
      - exec
      - process_list
      - process_poll
      - process_kill
      - file_write
      - file_edit
      - apply_patch
      # - folder_list   # excluded: returns JSON list; keep second LLM turn to format
      # - file_find     # excluded: returns JSON list; keep second LLM turn to format
      - http_request
      - webhook_trigger
      - knowledge_base_add
      - knowledge_base_remove
      - knowledge_base_list
      - browser_snapshot
      - browser_click
      - browser_type
    max_self_contained_length: 2000