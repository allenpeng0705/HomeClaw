# MkDocs config for HomeClaw documentation site
# Source: docs/ (website content). Design/internal docs are in docs_design/.
# Build: mkdocs build. Deploy to GitHub Pages via GitHub Actions.

site_name: HomeClaw
site_description: Local-first AI assistant — your home, your AI, your control.
site_url: https://allenpeng0705.github.io/HomeClaw/  # adjust if you use a custom domain
repo_url: https://github.com/allenpeng0705/HomeClaw
repo_name: HomeClaw

docs_dir: docs
strict: false  # allow links to repo files outside docs/ (docs_design, README, etc.)

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocs_subpath_plugin: {}  # rewrites /assets/ and /... links for GitHub Pages subpath

nav:
  - Home: index.md
  - Companion App: companion-app.md
  - Get Started:
    - Install: install.md
    - Run: run.md
    - Getting started: getting-started.md
    - Models: models.md
  - Connect:
    - Channels: channels.md
    - Remote access: remote-access.md
    - Deploy to cloud: deploy-cloud.md
  - Extend:
    - Tools: tools.md
    - Plugins: plugins.md
    - Writing plugins and skills: writing-plugins-and-skills.md
    - Friends: friends-plugin.md
  - Configure:
    - Core config (core.yml): core-config.md
    - Platform: platform.md
    - Per-user sandbox and file links: per-user-sandbox-and-file-links.md
    - Mix mode and reports: mix-mode-and-reports.md
    - Hybrid router scripts: hybrid-router-scripts.md
  - Reference:
    - Companion vs Channels: companion-vs-channels.md
    - Companion app (macOS permissions): companion-app-macos-permissions.md
    - Companion on iPhone (Cloudflare Tunnel): companion-iphone-cloudflare-tunnel.md
    - Introducing HomeClaw: introducing-homeclaw.md
    - Story: story.md
  - Help: help.md
