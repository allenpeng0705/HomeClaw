# Claude Code Bridge: run Claude Code CLI (claude) headlessly on the dev machine.
# Uses the same bridge server as Cursor Bridge (external_plugins/cursor_bridge/server.py) but a separate plugin id
# so Companion can have a dedicated ClaudeCode friend without mixing with Cursor.
id: claude-code-bridge
name: Claude Code Bridge
description: |
  Run Claude Code CLI ('claude') in headless mode on the user's dev machine and return output.
  Use when the user wants: "run claude code to review/fix/build and show me the result".
type: http
config:
  base_url: "http://127.0.0.1:3104"
  path: /run
  timeout_sec: 1800   # 30 min
  # bridge_api_key: "set-a-random-secret"   # optional; must match CURSOR_BRIDGE_API_KEY on the bridge server
capabilities:
  - id: set_cwd
    name: Set active project cwd
    description: Set the active project directory on the bridge so subsequent Claude runs default to it.
    parameters:
      - name: path
        type: string
        required: true
        description: Project folder path (absolute or relative to bridge default cwd).
  - id: run_agent
    name: Run Claude Code and get result
    description: Run Claude Code CLI headlessly in the active project and return the output. Pass skip_permissions true only when the user explicitly wants full auto-run (--dangerously-skip-permissions); false or omitted uses safer defaults (Companion flash off / server env).
    parameters:
      - name: task
        type: string
        required: true
        description: Task/prompt for Claude Code CLI.
      - name: cwd
        type: string
        required: false
        description: Working directory (optional; defaults to active project cwd).
      - name: timeout_sec
        type: integer
        required: false
        description: Max seconds (default 600; allowed 30–1800).
      - name: skip_permissions
        type: boolean
        required: false
        description: If true, adds --dangerously-skip-permissions (full tool/shell auto-run for this task). If false, omits it (stricter). If omitted, bridge uses HOMECLAW_CLAUDE_SKIP_PERMISSIONS_DEFAULT (Core cursor_bridge_claude_skip_permissions_default).
  - id: run_command
    name: Run command
    description: Run a shell command in the active project and return output.
    parameters:
      - name: command
        type: string
        required: true
      - name: cwd
        type: string
        required: false
  - id: get_status
    name: Get Bridge status
    description: Return bridge state (active cwd, default cwd, auth enabled).
    parameters: []
  - id: run_agent_interactive
    name: Start Claude Code interactively (PTY)
    description: Start the Claude Code CLI in an interactive PTY on the bridge machine. Returns session_id and initial_output; use interactive_read/interactive_write/interactive_stop for the same session.
    parameters:
      - name: backend
        type: string
        required: false
        description: claude (default for this plugin).
      - name: cwd
        type: string
        required: false
  - id: run_command_interactive
    name: Start command interactively (PTY)
    description: Start a shell command in a PTY on the bridge for interactive use.
    parameters:
      - name: command
        type: string
        required: true
      - name: cwd
        type: string
        required: false
      - name: backend
        type: string
        required: false
  - id: interactive_read
    name: Read from bridge interactive session
    parameters:
      - name: session_id
        type: string
        required: true
      - name: from_seq
        type: integer
        required: false
  - id: interactive_write
    name: Write to bridge interactive session
    parameters:
      - name: session_id
        type: string
        required: true
      - name: data
        type: string
        required: true
  - id: interactive_stop
    name: Stop bridge interactive session
    parameters:
      - name: session_id
        type: string
        required: true
