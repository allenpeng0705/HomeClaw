# Trae Bridge: run Trae Agent (trae-cli) from HomeClaw. Uses the same bridge server as Cursor/Claude Code.
# Trae Agent: https://github.com/bytedance/trae-agent — clone, uv sync, create trae_config.yaml with API key.
# Set cursor_bridge_trae_agent_path (path to trae-cli) and cursor_bridge_trae_agent_config (path to trae_config.yaml) in config.
id: trae-bridge
name: Trae Bridge
description: |
  Run Trae Agent (trae-cli) for software engineering tasks: set project folder, run a natural-language task and get the result,
  or run shell commands. Use when the user wants to: set/open a project folder for Trae Agent; run a coding task (e.g. "add tests", "fix the bug") and see the output; or run a command (e.g. npm test).
type: http
config:
  base_url: "http://127.0.0.1:3104"
  path: /run
  timeout_sec: 1800   # 30 min
  # bridge_api_key: "set-a-random-secret"   # optional; must match CURSOR_BRIDGE_API_KEY on the bridge server
capabilities:
  - id: open_project
    name: Set project folder for Trae Agent
    description: Set the active project directory so run_agent runs in this folder (Trae Agent has no IDE to open). Use when the user says "open project X in Trae", "use folder X for Trae".
    parameters:
      - name: path
        type: string
        required: true
        description: Folder path (absolute or relative to bridge CWD).
      - name: folder
        type: string
        required: false
        description: Alias for path.
  - id: set_cwd
    name: Set active project cwd
    description: Set the active project directory on the bridge so subsequent Trae Agent runs default to it.
    parameters:
      - name: path
        type: string
        required: true
        description: Project folder path (absolute or relative to bridge default cwd).
  - id: run_agent
    name: Run Trae Agent and get result
    description: Run trae-cli with a task in the active project; returns the agent output. Requires Trae Agent installed and trae_config.yaml with API key.
    parameters:
      - name: task
        type: string
        required: true
        description: Natural-language task (e.g. "add error handling to auth module", "create a hello world script").
      - name: cwd
        type: string
        required: false
        description: Working directory (optional; defaults to active project cwd).
      - name: timeout_sec
        type: integer
        required: false
        description: Max seconds (default 600; allowed 30–1800).
  - id: run_command
    name: Run command
    description: Run a shell command on the dev machine and return output (e.g. npm test, pip install).
    parameters:
      - name: command
        type: string
        required: true
        description: Shell command to run.
      - name: cwd
        type: string
        required: false
  - id: get_status
    name: Get Trae Bridge status
    description: Return bridge state (active cwd, default cwd, auth enabled).
    parameters: []
  - id: run_agent_interactive
    name: Start Trae Agent interactive (PTY)
    description: Start trae-cli interactive on the bridge. Returns session_id and initial_output; use interactive_read/write/stop.
    parameters:
      - name: backend
        type: string
        required: false
        description: trae (default for this plugin).
      - name: cwd
        type: string
        required: false
  - id: run_command_interactive
    name: Start command interactively (PTY)
    description: Start a shell command in a PTY on the bridge for interactive use.
    parameters:
      - name: command
        type: string
        required: true
      - name: cwd
        type: string
        required: false
      - name: backend
        type: string
        required: false
  - id: interactive_read
    name: Read from bridge interactive session
    parameters:
      - name: session_id
        type: string
        required: true
      - name: from_seq
        type: integer
        required: false
  - id: interactive_write
    name: Write to bridge interactive session
    parameters:
      - name: session_id
        type: string
        required: true
      - name: data
        type: string
        required: true
  - id: interactive_stop
    name: Stop bridge interactive session
    parameters:
      - name: session_id
        type: string
        required: true
